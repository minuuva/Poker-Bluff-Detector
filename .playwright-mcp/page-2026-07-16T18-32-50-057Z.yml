            - article [ref=e77]:
              - generic [ref=e78]:
                - generic [ref=e81]:
                  - 'heading "Opinion: ESPN’s New Poker Tell AI Is a Solution No One Asked For, to a Problem That Doesn’t Exist" [level=1] [ref=e82]'
                  - generic [ref=e86]:
                    - generic [ref=e87]:
                      - link "Alex Weldon" [ref=e90] [cursor=pointer]:
                        - /url: https://www.pokerscout.com/authors/alexw/
                      - generic [ref=e91]:
                        - img "checkmark" [ref=e92]
                        - text: Managing Editor
                      - time [ref=e96]: "Updated: 8 Jul 2026"
                    - generic [ref=e97]: Share this page
                - figure "Does poker actually need this?" [ref=e101]:
                  - img "A robot stands behind a poker player, holding up a sign that says \"Bluffing!\"" [ref=e102]
              - generic [ref=e104]:
                - paragraph [ref=e105]:
                  - strong [ref=e106]: ESPN’s coverage of this year’s World Series of Poker
                  - text: features a new gimmick no one asked for —
                  - strong [ref=e107]: AI-based analysis of players’ expressions and body language,
                  - text: which purports to determine whether or not they’re bluffing.
                - paragraph [ref=e108]:
                  - text: For game integrity reasons, the new technology will only be applied to players who have already been eliminated from the tournament. Even if it were applied to players during their live streams, there’s no clear need for it, since the “hole cam” (or
                  - link "its RFID successor" [ref=e109] [cursor=pointer]:
                    - /url: https://www.pokerscout.com/daniel-weinman-says-no-high-profile-rfid-cheating-wsop-believes-robbie-jade-lew-cheated/
                  - text: ) has been in effect since 2002.
                - paragraph [ref=e110]: Fans were quick to point this out on social media when the feature was announced.
                - blockquote [ref=e111]:
                  - paragraph [ref=e112]: Can’t we tell that they are bluffing by the fact that we know what cards they have
                  - paragraph [ref=e113]:
                    - text: — Baseball Aslan (@BaseballAslan)
                    - link "July 8, 2026" [ref=e114] [cursor=pointer]:
                      - /url: https://x.com/BaseballAslan/status/2074681046738616587?ref_src=twsrc%5Etfw
                - paragraph
                - paragraph [ref=e115]:
                  - text: The tool was developed by independent AI engineer
                  - strong [ref=e116]: Luke Geel,
                  - text: who describes himself as an avid poker player. He’s also adept at self-marketing, having written about his tell detector for
                  - emphasis [ref=e117]: Poker.org
                  - text: and landed a contract with Omaha Productions, the new producer for the televised WSOP this year.
                - paragraph [ref=e118]: If you ask me, however, this project highlights the biggest problem with the AI industry in general. It’s not that it hallucinates, or that it’s bad for the environment, or that it’s going to eliminate everyone’s jobs, or any of the other usual criticisms. I find most of those a little overblown.
                - paragraph [ref=e119]:
                  - text: It’s that
                  - emphasis [ref=e120]: no one actually seems to know what it’s for.
                  - text: AI has found a home here and there — for instance, in producing images to accompany op-eds like this one. However, in many cases, it is still a solution in search of a problem.
                - heading "Supply-Side Economics as a Business Plan" [level=2] [ref=e121]
                - paragraph [ref=e122]:
                  - text: This issue isn’t unique to the AI industry. It’s common across the tech sector. For instance, the entire wearables business seems predicated on the idea that because we
                  - emphasis [ref=e123]: can
                  - text: pack high-end electronics into a ring or a pair of sunglasses, there must be some reason someone would want that.
                - paragraph [ref=e124]:
                  - text: There’s been
                  - link "a popular meme" [ref=e125] [cursor=pointer]:
                    - /url: https://knowyourmeme.com/memes/profit
                  - text: "among engineers since the late 1990s that follows the format:"
                - list [ref=e126]:
                  - listitem [ref=e127]:
                    - text: "Step 1 and 2:"
                    - emphasis [ref=e128]: "[whatever it is your startup is doing]"
                  - listitem [ref=e129]: "Step 3: ???"
                  - listitem [ref=e130]: "Step 4: Profit!"
                - paragraph [ref=e131]:
                  - text: It’s probably no coincidence that the technology industry first began to take on its current form during and immediately after the Reagan years. Famously or infamously, depending on your perspective, that era of politics marked the rise in popularity of
                  - strong [ref=e132]:
                    - emphasis [ref=e133]: supply-side economics.
                - paragraph [ref=e134]: Reagan and his economic advisors popularized the idea that industrial output was the primary driver of the economy, and that tax cuts for the wealthy and for large businesses were the means to stimulate that.
                - paragraph [ref=e135]: It was an inversion of the long-held economic belief that consumer demand and consequent spending are what make for a healthy economy. Whereas once, economic policy focused on making sure the populace had money to spend on goods, the emphasis became on ensuring that output continued to grow under the assumption that someone, somewhere, would generate the requisite demand to match the supply.
                - paragraph [ref=e136]: That logic, which I happen to disagree with, seems to have infested the entrepreneurial world, especially on its high-tech fringes. Once upon a time, the business world would have started with a real problem — housing shortages, the plague of ticks descending on the East Coast, or the dire state of bacon packaging — and gone about finding a way to address it profitably.
                - paragraph [ref=e137]:
                  - text: Now, instead of that, we get smart rings and poker tell detection AI, and businesses that spend a lot of their time and energy on Step 3 in that meme. That is, trying to figure out how to get people to pay for the things that they built
                  - emphasis [ref=e138]: just because they could.
                - heading "Poker Tells Are Overrated" [level=2] [ref=e139]
                - paragraph [ref=e140]:
                  - text: Like those video-enabled smart glasses, it’s easier to imagine
                  - emphasis [ref=e141]: undesirable
                  - text: uses of AI tell detection than desirable ones. In fact, those two things together would be worse than the sum of their parts. And, as some have pointed out, it’s the sort of thing that government agencies might get excited about if it works too well, and we all know where that leads.
                - paragraph [ref=e142]: That said, the charitable view of the AI tell detection is that its novelty value might be worthwhile for one season, at least. Whether it succeeds at its task or fails, viewers might enjoy getting an answer to the question of whether this sort of thing is possible.
                - blockquote [ref=e143]:
                  - paragraph [ref=e144]: Seems more like a silly fun thing that has zero meaning but rec players will think it’s cool. We already know if players are bluffing we can see their cards on stream
                  - paragraph [ref=e145]:
                    - text: — sammie g (@thefakesammieg)
                    - link "July 8, 2026" [ref=e146] [cursor=pointer]:
                      - /url: https://x.com/thefakesammieg/status/2074869285655101556?ref_src=twsrc%5Etfw
                - paragraph
                - paragraph [ref=e147]: Beyond that, it’s less clear what such technology would add to a broadcast, even if hole cards weren’t available.
                - paragraph [ref=e148]:
                  - text: Any poker player knows that the importance of tells to the game is vastly overstated in pop culture. A player adept at interpreting behavior will use tells as a “tie-breaker” of sorts when the situation is otherwise a close one. However, it always plays second fiddle to strategic fundamentals. Zachary Elwood, author of
                  - emphasis [ref=e149]: Reading Poker Tells
                  - text: and
                  - emphasis [ref=e150]: Verbal Poker Tells
                  - text: ", repeatedly emphasizes in his books that a tell should never be your primary reason for making a decision."
                - paragraph [ref=e151]: In terms of applying AI to determine bluff frequency, the results for any competent player would be more accurate if using board texture and bet size as the inputs, rather than video data.
                - paragraph [ref=e152]: But that would put utility ahead of technological “wow factor.” And that’s not how the AI industry rolls.
                - paragraph [ref=e153]
