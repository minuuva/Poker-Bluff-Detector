# Seat map for session loAuriiBRCk (Feb 2026, "Alex Foxen, Suited Superman
# & Nik Airball").
#
# v2 schema: per player, a generous search region covering every zoom level
# of the shots that frame them, plus face-chip reference timestamps with the
# approximate face center x (full-frame px, detector-measured) to
# disambiguate multi-face frames.
#
# The two mapped players sit in ADJACENT seats and appear together in most
# cuts, which is what misled the old v1 map into swapping them. Commit
# evidence:
#
# AIRBALL is the glasses + gray CoinPoker t-shirt player (CoinPoker is his
# sponsor; same build as his confirmed Jul session look): framed at his
# RAISE flips t=1712 and t=8238, mid chip-toss 1.5s after his BET $300
# flip at t=11726, and standing to sweat his own $37,775 decision at
# t~5910 (a hand Suited Superman is not in).
#
# SUITEDSUPERMAN is the green Lacoste polo + mirrored sunglasses player:
# arm extended behind a freshly pushed stack 0.5s after his BET $3,000
# flip at t=13284 (97 percent equity, camera centered on him), and framed
# at his RAISE $300 flip at t=1591. Sunglasses make face blendshapes
# partly noise (same caveat as Airball in the Jul session); pose and
# smile remain usable.

seats:
  AIRBALL:
    search: {x: 700, y: 0, w: 1220, h: 800}
    face_refs:
      - {t: 6334.5, cx: 1060}
      - {t: 8238.5, cx: 1417}
      - {t: 11726.0, cx: 1430}
    # Two lookalikes. The black-jacket glasses neighbor correlates 0.66
    # with Airball's references. And the t=1712.5 frame, once used as an
    # Airball reference, actually contains a different dark-haired player
    # at that cx (the deterministic builder proved the enrollment was
    # wrong), so the same spec now serves as his distractor reference.
    distractors:
      - {t: 1712.5, cx: 1152}
      - {t: 14493.0, cx: 1862}
  SUITEDSUPERMAN:
    search: {x: 60, y: 0, w: 1100, h: 800}
    face_refs:
      - {t: 1591.5, cx: 450}
      - {t: 5692.0, cx: 411}
      - {t: 13284.5, cx: 828}
